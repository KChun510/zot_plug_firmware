services:
  nginx:
    build: ./nginx
    container_name: nginx
    profiles: ["prod"]
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/certs:/data/letsencrypt  # for ACME challenge responses
    ports:
      - "80:80"
      - "443:443"
      - "4000:4000"
    environment:
      - FRONTEND_HOST=frontend
      - BROKER_HOST=broker 
      - API_HOST=api
    networks:
      - zotplug_net
    depends_on:
      - frontend

  certbot:
    image: certbot/certbot
    container_name: certbot
    profiles: ["prod"]
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - ./nginx/certs:/data/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /data/letsencrypt --deploy-hook 'nginx -s reload'; done"
    networks:
      - zotplug_net
    depends_on:
      - nginx

  frontend:
    image: zotpluguci/zot_plug_frontend:beta
    container_name: zot_plug_frontend
    profiles: ["prod"]
    expose:
      - "3000"
    environment:
      - BASE_URL=http://api:4000
    restart: unless-stopped
    networks:
      - zotplug_net
    depends_on:
      - api
      - postgres

  broker:
    build: ./broker_mqtt
    container_name: broker_mqtt
    ports:
      - "1883:1883"
    networks:
      - zotplug_net
    depends_on:
      - postgres

  api:
    build:
      context: .
      dockerfile: rest_api/Dockerfile
    env_file: ./.env
    container_name: rest_api
    profiles: ["prod"]
    expose:
      - "4000"
    networks:
      - zotplug_net
    depends_on:
      - postgres

  api-dev:
    build:
      context: .
      dockerfile: rest_api/Dockerfile
    env_file: ./.env
    container_name: rest_api_dev
    profiles: ["dev"]
    ports:
      - "4000:4000"
    networks:
      - zotplug_net
    depends_on:
      - postgres

  cron:
    build: ./cron
    container_name: cron
    volumes:
      - ~/pg_db/backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - zotplug_net
    depends_on:
      - postgres

  postgres:
    image: postgres:alpine
    container_name: pg_db
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - zotplug_net
    volumes:
      - ~/pg_db/pgdata/:/var/lib/postgresql/data
      - ./pg_db/init.sql:/docker-entrypoint-initdb.d/init.sql


volumes:
  certbot-etc:
  certbot-var:

networks:
  zotplug_net:
    driver: bridge
